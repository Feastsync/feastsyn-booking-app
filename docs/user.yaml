openapi: 3.0.0
info:
  title: FeastSync Booking App API
  version: 1.0.0
  description: API documentation for the FeastSync Booking App, which allows users to book vendors for different events.
paths:
  /api/v1/user/register:
    post: 
      summary: this is the endpoint for user registration
      tags: [users]
      requestBody:
        required: true
        content: 
          application/json:
            schema:
              type: object
              required:
                - firstName
                - lastName
                - email
                - phoneNumber
                - password
                - confirmPassword  
              properties:
                firstName:
                  type: string
                  description: The user's first name 
                lastName:
                  type: string
                  description: The user's last name
                email:
                  type: string
                  description: The user's email address
                phoneNumber:
                  type: string
                  description: The user's phone number
                password:
                  type: string
                  description: The user's password
                confirmPassword:
                  type: string
                  description: Confirmation of the user's password
      responses:          
        '201':
          description: User created successfully


          
  /api/v1/user/verify:
    post: 
      summary: this is the endpoint for user verification
      tags: [users]
      requestBody:
        required: true
        content: 
          application/json:
            schema:
              type: object
              required:
                - email
                - otp
              properties:
                email:
                  type: string
                  description: The user's email address
                otp:
                  type: string
                  description: The one-time password for verification
      responses:
        '200':
          description: User verified successfully

          
  /api/v1/user/login:
    post: 
      summary: this is the endpoint for user login
      tags: [users]
      requestBody:
        required: true
        content: 
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  description: The user's email address
                password:
                  type: string
                  description: The user's password  
                  example: password123
      responses:          
        '200':
          description: User logged in successfully

          
  /api/v1/user/forgot-password:
    post: 
      summary: this is the endpoint for forgot password
      tags: [users]
      requestBody:
        required: true
        content: 
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  description: The user's email address
      responses:          
        '200':
          description: Forgot password request submitted successfully

  /api/v1/user/resend-otp:
    post: 
      summary: this is the endpoint for reset password otp
      tags: [users]
      requestBody:
        required: true
        content: 
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  description: The user's email address
      responses:          
        '200':
          description: OTP resent successfully   
                         
  /api/v1/user/reset-password:
    post: 
      summary: this is the endpoint for resetting password  
      tags: [users]
      requestBody:
        required: true
        content: 
          application/json:
            schema:
              type: object
              required:
                - email
                - otp
                - password
                - confirmPassword
              properties:
                email:
                  type: string
                  description: The user's email address 
                otp: 
                  type: string
                  description: one time pasword  
                password:
                  type: string
                  description: The user's new password
                confirmPassword:
                  type: string
                  description: Confirmation of the user's new password
      responses:          
        '200':
          description: User's password reset successfully

          
  /api/v1/user/change-password:
    post: 
      summary: this is the endpoint for changing password
      tags: [users]
      security:
        - bearerAuth: []
          name: Authorization
          in: headers
      requestBody:
        required: true
        content: 
          application/json:
            schema:
              type: object
              required:
                - oldPassword
                - newPassword
                - confirmPassword  
              properties:
                oldPassword:
                  type: string
                  description: The user's current password
                newPassword:
                  type: string
                  description: The user's new password
                confirmPassword:
                  type: string
                  description: Confirmation of the user's new password
      responses:          
        '200':
          description: User's password changed successfully

          
  /api/v1/user/all-users:
    get: 
      summary: this is the endpoint to retrieve all users
      tags: [users]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: All users retrieved successfully
        "500": 
          description: Something went wrong  

  /api/v1/user/one-user:
    get: 
      summary: this is the endpoint to retrieve one user
      tags: [users]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: user retrieved successfully found
        "500": 
          description: Something went wrong  


  /api/v1/user/logout:
    post: 
      summary: this is the endpoint for logging out
      tags: [users]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Logged out successfully
        "500": 
          description: Something went wrong        
  