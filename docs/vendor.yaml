openapi: 3.0.0
info:
  title: FeastSync Booking App API
  version: 1.0.0
  description: API documentation for the FeastSync Booking App, which allows vendors to be booked fordifferent events.
paths:
  /api/v1/vendor/register:
    post: 
      summary: this is the endpoint for vendor registration
      tags: [vendors]
      requestBody:
        required: true
        content: 
          application/json:
            schema:
              type: object
              required:
                - firstName
                - lastName
                - stageName
                - email
                - phoneNumber
                - password
                - confirmPassword  
              properties:
                firstName:
                  type: string
                  description: The vendor's first name 
                lastName:
                  type: string
                  description: The vendor's last name
                stageName:
                  type: string
                  description: The vendor's stage name
                phoneNumber:
                  type: string
                  description: The vendor's phone number  
                email:
                  type: string
                  description: The vendor's email address
                password:
                  type: string
                  description: The vendor's password
                confirmPassword:
                  type: string
                  description: Confirmation of the vendor's password
      responses:          
        '201':
          description: Vendor created successfully


          
  /api/v1/vendor/verify:
    post: 
      summary: this is the endpoint for vendor verification
      tags: [vendors]
      requestBody:
        required: true
        content: 
          application/json:
            schema:
              type: object
              required:
                - email
                - otp  
              properties:
                email:
                  type: string
                  description: The vendors's email address
                otp:
                  type: string
                  description: The one-time password for verification
      responses:
        '201':
          description: Vendor verified successfully

          
  /api/v1/vendor/login:
    post: 
      summary: this is the endpoint for vendor login
      tags: [vendors]
      requestBody:
        required: true
        content: 
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  description: The vendors's email address
                password:
                  type: string
                  description: The vendors's password
      responses:          
        '201':
          description: Vendor logged in successfully

          
  /api/v1/vendor/update/{id}:
    put: 
      summary: this is the endpoint for vendor's profile update
      tags: [vendors]
      parameters:
        - in: path
          name: id
      requestBody:
        required: true
        content: 
          multipart/form-data:
            schema:
              type: object
              required:
                - stateOfResidence
                - BankName
                - accountNumber
                - photoCatalogue
                - videoCatalogue
                - bio
                - profilePicture
                - coverPhoto
                - coverVideo
                - servicesOffered
              properties:
                stateOfResidence:
                  type: string
                  description: The vendor's state of residence
                BankName:
                  type: string
                  description: The vendor's bank name
                accountNumber:
                  type: string
                  description: The vendor's account number
                profilePicture:
                  type: string
                  format: binary
                  description: The vendor's profile picture
                coverPhoto:
                  type: string
                  format: binary
                  description: The vendor's cover photo
                coverVideo:
                  type: string
                  format: binary
                  description: The vendor's cover video
                photoCatalogue:
                  type: string
                  format: binary
                  description: A catalogue of photos
                videoCatalogue:
                  type: string
                  format: binary
                  description: A catalogue of videos
                bio:
                  type: string
                  description: The vendor's biography
                servicesOffered:
                  type: string
                  description: The services offered by the vendor
      responses:          
        '201':
          description: Vendor profile updated successfully


          
  /api/v1/vendor/forgot-password:
    post: 
      summary: this is the endpoint for forgot password
      tags: [vendors]
      requestBody:
        required: true
        content: 
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  description: The vendor's email address 
      responses:          
        '201':
          description: Forgot password request submitted successfully

          
  /api/v1/vendor/reset-password:
    post: 
      summary: this is the endpoint for resetting password  
      tags: [vendors]
      requestBody:
        required: true
        content: 
          application/json:
            schema:
              type: object
              required:
                - email
                - password
                - confirmPassword
              properties:
                email:
                type: string
                description: The vendor's email address
              password:
                type: string
                description: The vendor's password 
              confirmPassword:
                type: string
                description: Confirmation of the vendor's password
      responses:          
        '201':
          description: Vendor's password reset successfully

          
  /api/v1/vendor/change-password:
    post: 
      summary: this is the endpoint for changing password
      tags: [vendors]
      security:
        - bearerAuth: []
          name: Authorization
          in: headers
      requestBody:
        required: true
        content: 
          application/json:
            schema:
              type: object
              required:
                - oldPassword
                - newPassword
                - confirmPassword  
              properties:
                oldPassword:
                  type: string
                  description: The vendor's current password
                newPassword:
                  type: string
                  description: The vendor's new password
                confirmPassword:
                  type: string
                  description: Confirmation of the vendor's new password
      responses:          
        '201':
          description: Vendor's password changed successfully

          
  /api/v1/vendor/all-vendors:
    get: 
      summary: this is the endpoint to retrieve all vendors
      tags: [vendors]
      security:
        - bearerAuth: []
      responses:
        "201":
          description: All vendors retrieved successfully
        "500": 
          description: Something went wrong  

  /api/v1/vendor/one-vendor/{slug}:
    get: 
      summary: this is the endpoint to retrieve one vendor
      tags: [vendors]
      parameters:
        - in: path
          name: slug
      security:
        - bearerAuth: []
      responses:
        "201":
          description: vendor retrieved successfully found
        "500": 
          description: Something went wrong 

  /api/v1/vendor/logout:
    post: 
      summary: this is the endpoint for logging out
      tags: [vendors]
      security:
        - bearerAuth: []
      responses:
        "201":
          description: Logged out successfully
        "500": 
          description: Something went wrong        
