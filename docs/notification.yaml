openapi: 3.0.0
info:
  title: FeastSync Booking App API
  version: 1.0.0
  description: API documentation for the FeastSync Booking App, which allows both users and vendors get notifications.
paths:   
  /api/v1/notification:
    get:
      summary: Get logged-in user's notifications
      tags: [notifications]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Notifications fetched successfully

  /api/notification/read-notificatication/{notificationId}:
    put:
      summary: Mark one notification as read
      tags: [notifications]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: notificationId
      responses:
        "200":
          description: Notification marked as read

  /api/notification/mark-all-read:
    put:
      summary: Mark all notifications as read
      tags: [notifications]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: All notifications marked as read