openapi: 3.0.0
info:
  title: FeastSync Booking App API
  version: 1.0.0
  description: API documentation for the FeastSync Booking App, which allows user and vendors communicate through messages.
paths:
  /api/v1/message/history/{roomId}:
    get:
      summary: This is the endpoint to get message history by room ID
      tags: [message]
      parameters:
        - in: path
          name: roomId
          required: true
          
          schema:
            type: string
            example: feastsync_65f1a92c2b7c9a001234abcd
      responses:
        "200":
          description: Messages fetched successfully
        "400":
          description: Invalid roomId format
        "404":
          description: Booking not found
        "500":
          description: Failed to fetch messages

  /api/v1/message/messages/{bookingId}:
    post:
      summary: Send a message for a booking
      tags: {message}
      parameters:
        - in: path
          name: bookingId
          required: true
          schema:
            type: string
            example: 65f1a92c2b7c9a001234abcd
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - text
                - senderId
                - receiverId
                - roomId
              properties:
                text:
                  type: string
                  example: Hello, I want to confirm the booking details.
                senderId:
                  type: string
                  description: The ID of the sender of the message
                receiverId:
                  type: string
                  description: The ID of the receiver of the message 
                roomId:
                  type: string
                  description: The ID of the chat room
      responses:
        "201":
          description: Message sent successfully
        "400":
          description: Missing required fields
        "500":
          description: Failed to send message

  /api/v1/message/{bookingId}:  
    get:
      summary: This endpoint helps to get messages for a booking
      tags: [message]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: bookingId
          required: true
          schema:
            type: string
            example: 65f1a92c2b7c9a001234abcd
      responses:
        "200":
          description: Booking messages fetched successfully
        "400":
          description: User has not been assigned yet
        "401":
          description: Unauthorized
        "404":
          description: Booking not found
        "500":
          description: Failed to get messages