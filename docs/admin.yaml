  /api/v1/admin/login-admin:
    post: 
      summary: this is the endpoint for admin login
      tags: [admin]
      requestBody:
        required: true
        content: 
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  description: The admin's email address
                password:
                  type: string
                  description: The admin's password  
      responses:          
        '200':
          description: admin logged in successfully  

  /api/v1/admin/logout-admin:
    post: 
      summary: this is the endpoint for logging out
      tags: [admin]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Logged out successfully
        "500": 
          description: Something went wrong     

  /api/v1/admin/forgot-password-admin:
    post: 
      summary: this is the endpoint for forgot password
      tags: [admin]
      requestBody:
        required: true
        content: 
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  description: The admin's email address 
      responses:          
        '200':
          description: Forgot password request submitted successfully
  

  /api/v1/admin/resend-otp-admin:
    post: 
      summary: this is the endpoint to resend otp
      tags: [admin]
      requestBody:
        required: true
        content: 
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  description: The admin's email address
      responses:          
        '200':
          description: OTP resent successfully

  /api/v1/admin/verify-otp-admin:
    post: 
      summary: this is the endpoint to verify reset otp
      tags: [admin]
      requestBody:
        required: true
        content: 
          application/json:
            schema:
              type: object
              required:
                - email
                - otp
              properties:
                email:
                  type: string
                  description: The admin's email address
                otp: 
                  type: string
                  description: One time password  
      responses:          
        '200':
          description: Reset OTP verified successfully

          
  /api/v1/admin/reset-password-admin:
    post: 
      summary: this is the endpoint for resetting password  
      tags: [admin]
      requestBody:
        required: true
        content: 
          application/json:
            schema:
              type: object
              required:
                - email
                - password
                - confirmPassword
              properties:
                email:
                  type: string
                  description: The admin's email address
                password:
                  type: string
                  description: The admin's password 
                confirmPassword:
                  type: string
                  description: Confirmation of the admin's password
      responses:          
        '200':
          description: admin's password reset successfully                           
  