  /api/v1/admin/all-pending-kyc:
    get:
      summary: Get all pending KYC submissions
      tags: [admin]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Pending KYC submissions fetched successfully
          content:
            application/json:
              schema:
                type: object
              properties:
                count:
                  type: integer
                  example: 3
                data:
                  type: array
                  items:
                    $ref: "#/components/schemas/Kyc"
        "401":
          description: Unauthorized
        "403":
          description: Admin access required
        "500":
          description: Server error

  /api/v1/admin/approve-kyc/{kycId}:
    put:
      summary: Approve a KYC submission
      tags: [admin]
      security:
        - bearerAuth: []
      parameters:
      - in: path
        name: kycId
      responses:
        "200":
          description: KYC approved successfully
        "401":
          description: Unauthorized
        "403":
          description: Admin access required
        "404":
          description: KYC not found
        "500":
          description: Server error

  /api/v1/admin/reject-kyc/{kycId}:
    put:
      summary: Reject a KYC submission
      tags: [admin]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: kycId
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - rejectionReason
              properties:
                rejectionReason:
                  type: string
                  example: Uploaded document is unclear. Please submit a clearer image.
      responses:
        "200":
          description: KYC rejected successfully
        "400":
          description: Bad request
        "401":
          description: Unauthorized
        "403":
          description: Admin access required
        "404":
          description: KYC not found
        "500":
          description: Server error

  /api/v1/admin/all-payments:
    get:
      summary: Get all payments
      tags: [admin]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: All payments retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: All payments retrieved
                  count:
                    type: integer
                    example: 12
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Payment"
        "401":
          description: Unauthorized
        "403":
          description: Admin access required
        "500":
          description: Server error

  /api/v1/admin/one-payment/{paymentId}:
    get:
      summary: Get one payment
      tags: [admin]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: paymentId
      responses:
        "200":
          description: Payment fetched successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Payment"
        "401":
          description: Unauthorized
        "403":
          description: Admin access required
        "404":
          description: Payment not found
        "500":
          description: Server error

  /api/v1/admin/all-bookings:
    get:
      summary: Get all bookings
      tags: [admin]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Bookings fetched successfully
        "401":
          description: Unauthorized
        "403":
          description: Admin access required
        "500":
          description: Server error

  /api/v1/admin/one-booking/{bookingId}:
    get:
      summary: Get one booking
      tags: [admin]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: bookingId
      responses:
        "200":
          description: Booking retrieved successfully
        "401":
          description: Unauthorized
        "403":
          description: Admin access required
        "404":
          description: Booking not found
        "500":
          description: Server error

  /api/v1/admin/disputes/{disputeId}:
    put:
      summary: Resolve or update a dispute
      tags: [admin]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: disputeId
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - status
                - adminComment
              properties:
                status:
                  type: string
                  description: The status of the dispute
                adminComment:
                  type: string
                  description: Issue reviewed and resolved by admin.
      responses:
        "200":
          description: Dispute updated successfully
        "401":
          description: Unauthorized
        "403":
          description: Admin access required
        "404":
          description: Dispute not found
        "500":
          description: Server error

  /api/v1/admin/vendor-reviews/{vendorId}:
    get:
      summary: Get reviews for a vendor
      tags: [admin]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: vendorId
      responses:
        "200":
          description: Vendor reviews fetched successfully
        "401":
          description: Unauthorized
        "403":
          description: Admin access required
        "500":
          description: Server error

  /api/v1/admin/user-reviews/{userId}:
    get:
      summary: Get reviews by a user
      tags: [admin]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: userId
      responses:
        "200":
          description: User reviews fetched successfully
        "401":
          description: Unauthorized
        "403":
          description: Admin access required
        "500":
          description: Server error

  /api/v1/admin/contact-message:
    get:
      summary: Get all contact messages
      tags: [admin]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Contact messages fetched successfully
        "401":
          description: Unauthorized
        "403":
          description: Admin access required
        "500":
          description: Server error

