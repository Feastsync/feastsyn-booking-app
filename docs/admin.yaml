openapi: 3.0.0
info:
  title: FeastSync Booking App API
  version: 1.0.0
  description: API documentation for the FeastSync Booking App, which allows the Admin manage some activities.
paths:
  /api/v1/admin/dashboard-stats:
    get:
      summary: Get admin dashboard statistics
      security:
        - bearerAuth: []
      tags: [admin]  
        content:
          application/json:
            schema:
              type: object
              properties:
                totalUsers:
                  type: integer
                  example: 120
                totalVendors:
                  type: integer
                  example: 35
                pendingKYC:
                  type: integer
                  example: 8
                verifiedVendors:
                  type: integer
                  example: 27
                totalBookings:
                  type: integer
                  example: 90
                totalPayments:
                  type: integer
                  example: 76
      responses:
        "200":
          description: Dashboard statistics fetched successfully              
        "401":
          description: Unauthorized
        "403":
          description: Admin access required
        "500":
          description: Server error


  /api/v1/admin/all-vendors:
    get:
      summary: Get all vendors
      tags: [admin]
      responses:
        "200":
          description: Vendors fetched successfully
          content:
            application/json:
              schema:
                type: object
              properties:
                count:
                  type: integer
                  example: 5
                data:
                  type: array
                  items:
                    $ref: "#/components/schemas/Vendor"
        "401":
          description: Unauthorized
        "403":
          description: Admin access required
        "500":
          description: Server error

