openapi: 3.0.0
info:
  title: FeastSync Booking App API
  version: 1.0.0
  description: API documentation for the FeastSync Booking App, which allows users to make payments to vendors for different events.
paths:
  /api/v1/payment/initialize-payment/{vendorId}/{bookingId}:
    post: 
      summary: this is the endpoint for initializing a payment
      tags: [payments]
      security:
        - bearerAuth: []
          name: Authorization
          in: headers
      parameters:
        - in: path
          name: vendorId
          required: true

        - in: path
          name: bookingId
          required: true  
      responses:          
        '201':
          description: Payment initialized successfully
        '500': 
          description: Something went wrong


          
  /api/v1/payment/payout-funds:
    post: 
      summary: this is the endpoint for withdrawal
      tags: [payments]
      security:
        - bearerAuth: []
        
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - amount
              properties:
                amount: 
                  type: integer
                  minimum: 100
                  example: 5000
                  description: The amount to be paid out      
      responses:          
        '200':
          description: withdrawal initiated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Withdrawal initiated successfully
        '400':
           description: Invalid request data

        '401':
          description: Unauthorized

        '500': 
          description: Something went wrong

          
  /api/v1/payment/all-payments:
    post: 
      summary: this is the endpoint for initializing a payment
      tags: [payments]
      security:
        - bearerAuth: []
          name: Authorization
          in: headers
      responses:          
        '200':
          description: Payment initialized successfully
        '500': 
          description: Something went wrong


